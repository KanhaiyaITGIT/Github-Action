name: prod-dev-QA
on:
  push:
    branches:
      - main
      - develop
      - feature/**

jobs:
  qualtiy_checks:
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'feature') && github.event_name == 'push'
    steps:
      - name: deploying code in QA ENvironemnt
        run: echo "performing qaulity check and deploying code in QA ENV.

  dev_deploy:
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop' && github.event_name == 'push'
    steps:
      - name: Dev Deploy
        run: echo "Deploying code in dev environment"

  prod_deploy:
    runs-on: ubuntu-latest
    if: github.ref_name == 'prod' && github.event_name == 'push'
    steps:
      - name: deploying code in Production
        run: echo "deploying code in prod enviroment"

  success_notify:
    runs-on: ubuntu-latest
    needs: ['qualtiy_checks', 'dev_deploy', 'prod_deploy' ]
    if: always() && !failure()
    steps:
      - name: success deployment
        run: echo "pipeline success"

  failure_notify:
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: failure
        run: echo "pipeline failure"
