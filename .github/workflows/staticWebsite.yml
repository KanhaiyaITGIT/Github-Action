name: input type usage
on:
  workflow_dispatch:
    inputs:
      environment:
        description: choose the environment to deploy
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
          - QA
      artifacts_tags:
        description: choose tag to deploy
        required: true

jobs:
  input:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying application wiht the help of input type
        run: echo "deploying tag ${{ inputs.artifacts_tags }} to ${{ inputs.artifacts_tags }} Environment."
        
