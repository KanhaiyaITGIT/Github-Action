name: if condition
on:
  push:
    branches:
      - qa
      - prod
      - dev
  pull_request:
    branches:
      - qa
      - dev
      - prod

jobs:
  condition:
    runs-on: ubuntu-latest
    steps:
      - name: deplyong changes only on main branch
        if: github.ref == 'refs/heads/main'
        run: echo "code is being deployed on main branch"
      - name: run this step
        run: echo "the pipeline is running"
      - name: run this steps
        run: echo "${{ github.ref_name }}"
       
    
